<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Today's Doses — Wellora</title>
<link rel="stylesheet" href="css/styles.css">
</head>
<body>
<div class="app-shell">
  <div id="sidebar-slot"></div>
  <div class="main-col">
    <div id="topbar-slot"></div>
    <main class="page">
      <div class="page-head">
        <div class="page-head-row">
          <div>
            <h1>Today's Dose Schedule</h1>
            <p class="sub">Friday, 17 July 2026</p>
          </div>
          <div style="display:flex; gap:8px; align-items:center;">
            <button class="icon-btn" aria-label="Previous day" id="btn-prev"></button>
            <button class="btn btn-secondary btn-sm">Today</button>
            <button class="icon-btn" aria-label="Next day" id="btn-next"></button>
          </div>
        </div>
      </div>

      <div style="display:flex; gap:20px; flex-wrap:wrap; margin-bottom:20px;">
        <div>
          <div class="text-faint" style="font-size:11.5px; text-transform:uppercase; letter-spacing:.06em; font-weight:700; margin-bottom:8px;">Profile</div>
          <div class="segmented" id="profile-filter">
            <button class="active" data-value="all">All profiles</button>
            <button data-value="rheetam">Rheetam</button>
            <button data-value="mother">Mother</button>
            <button data-value="father">Father</button>
          </div>
        </div>
        <div>
          <div class="text-faint" style="font-size:11.5px; text-transform:uppercase; letter-spacing:.06em; font-weight:700; margin-bottom:8px;">Status</div>
          <div class="segmented" id="status-filter">
            <button class="active" data-value="all">All</button>
            <button data-value="upcoming">Upcoming</button>
            <button data-value="taken">Taken</button>
            <button data-value="missed">Missed</button>
            <button data-value="skipped">Skipped</button>
          </div>
        </div>
      </div>

      <div id="dose-list" style="display:flex; flex-direction:column; gap:12px;"></div>
    </main>
  </div>
</div>
<div id="mobilenav-slot"></div>

<!-- Take dose modal -->
<div class="modal-overlay" id="modal-take">
  <div class="modal">
    <h3>Mark dose as taken</h3>
    <p class="modal-sub" id="take-modal-sub">Confirm the details for this dose.</p>
    <div class="field-row">
      <div class="field"><label>Taken time</label><input type="time" id="take-time"></div>
      <div class="field"><label>Quantity taken</label><input type="number" value="1" min="0"></div>
    </div>
    <div class="field"><label>Notes <span class="text-faint">(optional)</span></label><textarea placeholder="Anything worth noting"></textarea></div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal('modal-take')">Cancel</button>
      <button class="btn btn-primary" onclick="confirmAndClose('modal-take','Dose recorded as taken')">Save</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-skip-reason">
  <div class="modal">
    <h3>Why are you skipping this dose?</h3>
    <p class="modal-sub">This helps keep an accurate record for you and your caregivers.</p>
    <div class="field">
      <select><option>Doctor advised</option><option>Feeling unwell</option><option>Medicine unavailable</option><option>Personal choice</option><option>Other</option></select>
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal('modal-skip-reason')">Cancel</button>
      <button class="btn btn-critical" onclick="confirmSkip()">Confirm Skip</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-snooze">
  <div class="modal">
    <h3>Snooze this reminder</h3>
    <p class="modal-sub">We'll remind you again after the time you choose.</p>
    <div style="display:flex; flex-direction:column; gap:8px;">
      <button class="btn btn-secondary btn-block" onclick="confirmSnooze('10 minutes')">10 minutes</button>
      <button class="btn btn-secondary btn-block" onclick="confirmSnooze('30 minutes')">30 minutes</button>
      <button class="btn btn-secondary btn-block" onclick="confirmSnooze('1 hour')">1 hour</button>
      <button class="btn btn-secondary btn-block">Choose time…</button>
    </div>
    <div class="modal-actions"><button class="btn btn-ghost" onclick="closeModal('modal-snooze')">Cancel</button></div>
  </div>
</div>

<script src="js/icons.js"></script>
<script src="js/data.js"></script>
<script src="js/components.js"></script>
<script src="js/app.js"></script>
<script>
  renderShell("doses");
  document.getElementById("btn-prev").innerHTML = icon("chevronLeft");
  document.getElementById("btn-next").innerHTML = icon("chevronRight");

  const doses = WELLORA_DATA.todayDoses.map((d,i) => ({...d, id:i, profile: d.for.toLowerCase()}));
  let profileF = "all", statusF = "all";

  function renderDoses(){
    const filtered = doses.filter(d => (profileF === "all" || d.profile === profileF) && (statusF === "all" || d.status === statusF));
    const el = document.getElementById("dose-list");
    if (!filtered.length){
      el.innerHTML = `<div class="card"><div class="empty-state">${icon('doses')}<h3>No doses match these filters</h3><p>Try a different profile or status filter.</p></div></div>`;
      return;
    }
    const pillCls = { taken: "pill-taken", missed: "pill-missed", upcoming: "pill-upcoming" };
    const pillLabel = { taken: "Taken", missed: "Missed", upcoming: "Upcoming" };
    el.innerHTML = filtered.map(d => {
      let actions = "";
      if (d.status === "upcoming"){
        actions = `<button class="btn btn-primary btn-sm" onclick="openTakeModal('${d.medicine}')">Take now</button>
          <button class="btn btn-secondary btn-sm" onclick="snoozeDoseFlow('${d.medicine}')">Snooze</button>`;
      } else if (d.status === "missed"){
        actions = `<button class="btn btn-secondary btn-sm" onclick="openTakeModal('${d.medicine}')">Mark as taken</button>
          <button class="btn btn-ghost btn-sm" onclick="skipDoseFlow('${d.medicine}')">Skip</button>`;
      } else {
        actions = `<span class="text-faint mono" style="font-size:12.5px;">Recorded at ${d.takenAt}</span>`;
      }
      return `<div class="dose-card">
        <div class="dose-time">${d.time}</div>
        <div class="dose-body">
          <div class="name">${d.medicine}</div>
          <div class="meta">For ${d.for} · ${d.instructions} · Stock remaining varies by medicine</div>
        </div>
        <span class="pill ${pillCls[d.status]}">${pillLabel[d.status]}</span>
        <div class="dose-actions">${actions}</div>
      </div>`;
    }).join("");
  }

  function openTakeModal(name){
    document.getElementById("take-modal-sub").textContent = `Confirm details for ${name}.`;
    const now = new Date();
    document.getElementById("take-time").value = now.toTimeString().slice(0,5);
    openModal("modal-take");
  }

  document.querySelectorAll("#profile-filter button").forEach(btn => btn.addEventListener("click", () => {
    document.querySelectorAll("#profile-filter button").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active"); profileF = btn.dataset.value; renderDoses();
  }));
  document.querySelectorAll("#status-filter button").forEach(btn => btn.addEventListener("click", () => {
    document.querySelectorAll("#status-filter button").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active"); statusF = btn.dataset.value; renderDoses();
  }));

  renderDoses();
</script>
</body>
</html>
