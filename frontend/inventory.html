<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inventory — Wellora</title>
<link rel="stylesheet" href="css/styles.css">
</head>
<body>
<div class="app-shell">
  <div id="sidebar-slot"></div>
  <div class="main-col">
    <div id="topbar-slot"></div>
    <main class="page">
      <div class="page-head">
        <div class="page-head-row">
          <div><h1>Medicine Inventory</h1><p class="sub">Stock levels across every medicine and family member.</p></div>
        </div>
      </div>

      <div class="grid grid-4" style="margin-bottom:22px;" id="summary-cards"></div>

      <div class="tab-row" data-tab-group>
        <button class="active" data-tab="stock">Current Stock</button>
        <button data-tab="history">Inventory Activity</button>
      </div>

      <div data-tab-group>
        <div class="tab-panel active" data-panel="stock">
          <div style="display:flex; gap:12px; align-items:center; margin-bottom:16px; flex-wrap:wrap;">
            <div class="search-box" style="max-width:300px;" id="inv-search-box"><input type="text" id="inv-search" placeholder="Search by medicine or person">
            </div>
            <div class="segmented" id="stock-filter">
              <button class="active" data-value="all">All</button>
              <button data-value="low">Low stock</button>
              <button data-value="critical">Critical</button>
              <button data-value="good">In stock</button>
            </div>
          </div>
          <div class="table-wrap">
            <table>
              <thead><tr><th>Medicine</th><th>User</th><th class="num">Current Stock</th><th class="num">Daily Use</th><th class="num">Days Left</th><th>Expiry</th><th>Status</th><th></th></tr></thead>
              <tbody id="inv-table-body"></tbody>
            </table>
          </div>
        </div>

        <div class="tab-panel" data-panel="history">
          <div class="card" style="padding:6px 22px;">
            <div id="tx-list"></div>
          </div>
        </div>
      </div>
    </main>
  </div>
</div>
<div id="mobilenav-slot"></div>

<!-- Add / update stock modal -->
<div class="modal-overlay" id="modal-add-stock">
  <div class="modal">
    <h3>Update Inventory</h3>
    <p class="modal-sub" id="stock-modal-med">Metformin 500 mg</p>

    <div class="segmented" id="update-type-group" style="margin-bottom:16px;">
      <button class="active" data-value="add">Add stock</button>
      <button data-value="remove">Remove stock</button>
      <button data-value="replace">Replace quantity</button>
      <button data-value="dispose">Dispose expired</button>
      <button data-value="damaged">Record damaged</button>
    </div>

    <div class="field"><label>Quantity</label><input type="number" id="stock-qty" value="30" oninput="updateStockPreview()"></div>
    <div class="field-row">
      <div class="field"><label>Purchase date</label><input type="date"></div>
      <div class="field"><label>Expiry date</label><input type="date"></div>
    </div>
    <div class="field-row">
      <div class="field"><label>Batch number</label><input type="text" placeholder="Optional"></div>
      <div class="field"><label>Pharmacy</label><input type="text" placeholder="Greenline Pharmacy"></div>
    </div>
    <div class="field"><label>Notes</label><textarea placeholder="Optional"></textarea></div>

    <div class="card card-pad" style="background:var(--paper-dim); border:none;">
      <div style="display:flex; justify-content:space-between; font-size:13px; margin-bottom:6px;"><span>Current stock</span><span id="stock-current" class="mono" data-value="18">18 tablets</span></div>
      <div style="display:flex; justify-content:space-between; font-size:13px; margin-bottom:6px;"><span>Change</span><span id="stock-change" class="mono">+30 tablets</span></div>
      <div class="divider" style="margin:8px 0;"></div>
      <div style="display:flex; justify-content:space-between; font-weight:700;"><span>New stock</span><span id="stock-preview-new" class="mono" style="color:var(--teal-deep);">48 tablets</span></div>
    </div>

    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal('modal-add-stock')">Cancel</button>
      <button class="btn btn-primary" onclick="confirmStockUpdate()">Confirm Inventory Update</button>
    </div>
  </div>
</div>

<span id="stock-unit" style="display:none;">tablets</span>

<script src="js/icons.js"></script>
<script src="js/data.js"></script>
<script src="js/components.js"></script>
<script src="js/app.js"></script>
<script>
  renderShell("inventory");
  document.getElementById("inv-search-box").insertAdjacentHTML("afterbegin", icon("search"));
  initTabs();

  const meds = WELLORA_DATA.medicines;
  const low = meds.filter(m=>m.stockStatus==='low').length;
  const crit = meds.filter(m=>m.stockStatus==='critical').length;
  const expSoon = meds.filter(m=>m.expiryDate.includes('2026')).length;

  const summary = [
    { label: "Total medicines", value: meds.length, icon: "medicines", chip: "chip-teal" },
    { label: "Low-stock medicines", value: low, icon: "alertTriangle", chip: "chip-warning" },
    { label: "Critical / out of stock", value: crit, icon: "alertCircle", chip: "chip-critical" },
    { label: "Expiring soon", value: expSoon, icon: "expiry", chip: "chip-gold" },
  ];
  document.getElementById("summary-cards").innerHTML = summary.map(s => `
    <div class="card card-pad stat-card">
      <span class="icon-chip ${s.chip}">${icon(s.icon)}</span>
      <span class="value">${s.value}</span>
      <span class="label">${s.label}</span>
    </div>`).join("");

  const stockPillCls = { low: "pill-low", good: "pill-good", critical: "pill-out" };
  const stockLabel = { low: "Low", good: "Good", critical: "Critical" };
  let stockF = "all";

  function renderInvTable(){
    const q = document.getElementById("inv-search").value.toLowerCase();
    const rows = meds.filter(m => (stockF==="all" || m.stockStatus===stockF) && (m.name.toLowerCase().includes(q) || m.for.toLowerCase().includes(q)));
    document.getElementById("inv-table-body").innerHTML = rows.map(m => `
      <tr>
        <td><strong>${m.name}</strong> <span class="text-faint">${m.strength}</span></td>
        <td>${m.for}</td>
        <td class="num">${m.stock} ${m.unit}</td>
        <td class="num">${m.dailyUse || "As needed"}</td>
        <td class="num">${m.daysLeft ?? "—"}</td>
        <td>${m.expiryDate}</td>
        <td><span class="pill ${stockPillCls[m.stockStatus]}">${stockLabel[m.stockStatus]}</span></td>
        <td><button class="btn btn-secondary btn-sm" onclick="openStockModal('${m.name} ${m.strength}', ${m.stock}, '${m.unit}')">Add stock</button></td>
      </tr>`).join("") || `<tr><td colspan="8"><div class="empty-state">${icon('inventory')}<h3>No medicines match</h3><p>Try a different search or filter.</p></div></td></tr>`;
  }
  document.getElementById("inv-search").addEventListener("input", renderInvTable);
  document.querySelectorAll("#stock-filter button").forEach(btn => btn.addEventListener("click", () => {
    document.querySelectorAll("#stock-filter button").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active"); stockF = btn.dataset.value; renderInvTable();
  }));
  renderInvTable();

  function openStockModal(name, current, unit){
    document.getElementById("stock-modal-med").textContent = name;
    document.getElementById("stock-current").dataset.value = current;
    document.getElementById("stock-current").textContent = current + " " + unit;
    document.getElementById("stock-unit").textContent = unit;
    document.getElementById("stock-qty").value = 30;
    updateStockPreview();
    openModal("modal-add-stock");
  }
  document.querySelectorAll("#update-type-group button").forEach(btn => btn.addEventListener("click", () => {
    document.querySelectorAll("#update-type-group button").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active"); updateStockPreview();
  }));

  document.getElementById("tx-list").innerHTML = WELLORA_DATA.inventoryTransactions.map(t => `
    <div class="row-item" style="align-items:flex-start;">
      <span class="dot" style="background:${t.type==='added'?'var(--success)':t.type==='deduction'?'var(--teal)':'var(--warning)'}; margin-top:5px;"></span>
      <div class="txt">
        <div><span class="mono" style="font-weight:700;">${t.change}</span> — ${t.reason}</div>
        <div class="text-faint" style="font-size:12px;">Updated by ${t.by}</div>
      </div>
      <span class="when">${t.date}</span>
    </div>`).join("");
</script>
</body>
</html>
