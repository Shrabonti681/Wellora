<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simplified Mode — Wellora</title>
<link rel="stylesheet" href="css/styles.css">
</head>
<body class="simplified">
<div class="app-shell">
  <div class="main-col" style="width:100%;">
    <header class="topbar" style="justify-content:space-between;">
      <a href="settings.html" style="display:flex; align-items:center; gap:8px; text-decoration:none; color:var(--ink-soft); font-weight:600;" id="back-link"></a>
      <span class="brand-name" style="font-size:20px;">Wellora</span>
      <button class="icon-btn" aria-label="Notifications" id="bell-btn"></button>
    </header>
    <main class="page">
      <div class="page-head">
        <h1 style="font-size:28px;">Good morning, Rheetam</h1>
        <p class="sub" style="font-size:16px;">Here's what's next today.</p>
      </div>

      <button class="big-btn" onclick="markDoseTaken(this,'Metformin')">
        <span id="bi-1"></span>
        <span>Take Morning Medicine<div class="sub">Metformin 500 mg — 1 tablet after breakfast</div></span>
      </button>
      <button class="big-btn" onclick="location.href='doses.html'">
        <span id="bi-2"></span>
        <span>View Next Dose<div class="sub">Metformin 500 mg at 8:00 PM</div></span>
      </button>
      <button class="big-btn" onclick="showToast('Calling caregiver Anika…')">
        <span id="bi-3"></span>
        <span>Call Caregiver<div class="sub">Anika Chowdhury</div></span>
      </button>
      <button class="big-btn" onclick="location.href='inventory.html'">
        <span id="bi-4"></span>
        <span>Medicine Running Low<div class="sub">Metformin — 18 tablets left</div></span>
      </button>
      <button class="big-btn" onclick="location.href='doses.html'">
        <span id="bi-5"></span>
        <span>View Today's Schedule<div class="sub">6 doses today</div></span>
      </button>
    </main>
  </div>
</div>

<script src="js/icons.js"></script>
<script src="js/data.js"></script>
<script src="js/components.js"></script>
<script src="js/app.js"></script>
<script>
  document.getElementById("back-link").innerHTML = icon("chevronLeft") + "<span>Exit</span>";
  document.getElementById("bell-btn").innerHTML = icon("bell");
  document.getElementById("bi-1").innerHTML = icon("doses");
  document.getElementById("bi-2").innerHTML = icon("calendarClock");
  document.getElementById("bi-3").innerHTML = icon("family");
  document.getElementById("bi-4").innerHTML = icon("inventory");
  document.getElementById("bi-5").innerHTML = icon("schedule");
</script>
</body>
</html>
