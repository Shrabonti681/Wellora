<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reminders — Wellora</title>
<link rel="stylesheet" href="css/styles.css">
</head>
<body>
<div class="app-shell">
  <div id="sidebar-slot"></div>
  <div class="main-col">
    <div id="topbar-slot"></div>
    <main class="page">
      <div class="page-head">
        <div class="page-head-row">
          <div><h1>Reminders and Alerts</h1><p class="sub">Dose, inventory, prescription, and expiry notifications in one place.</p></div>
          <button class="btn btn-secondary" onclick="openModal('modal-reminder-settings')">Reminder settings</button>
        </div>
      </div>

      <div class="segmented" id="cat-filter" style="margin-bottom:18px;">
        <button class="active" data-value="all">All</button>
        <button data-value="Dose">Dose</button>
        <button data-value="Inventory">Inventory</button>
        <button data-value="Prescription">Prescription</button>
        <button data-value="Expiry">Expiry</button>
      </div>

      <div style="display:flex; flex-direction:column; gap:12px;" id="reminder-list"></div>
    </main>
  </div>
</div>
<div id="mobilenav-slot"></div>

<div class="modal-overlay" id="modal-reminder-settings">
  <div class="modal">
    <h3>Reminder Settings</h3>
    <p class="modal-sub">Choose how and when you'd like to be notified.</p>
    <div class="field"><label>Notification type</label>
      <select><option>Browser + Email</option><option>Email only</option><option>SMS + Email</option></select>
    </div>
    <div class="field"><label>Reminder timing</label>
      <select><option>At scheduled time</option><option>10 minutes before</option><option>30 minutes before</option></select>
    </div>
    <div class="field"><label>Repeat frequency</label>
      <select><option>Every 10 minutes until recorded</option><option>Once only</option><option>Every 15 minutes, up to 3 times</option></select>
    </div>
    <div class="field-row">
      <div class="field"><label>Quiet hours start</label><input type="time" value="22:00"></div>
      <div class="field"><label>Quiet hours end</label><input type="time" value="07:00"></div>
    </div>
    <div class="check-row"><input type="checkbox" checked><label>Notify caregiver after dose is missed</label></div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal('modal-reminder-settings')">Cancel</button>
      <button class="btn btn-primary" onclick="confirmAndClose('modal-reminder-settings','Reminder settings saved')">Save Settings</button>
    </div>
  </div>
</div>

<script src="js/icons.js"></script>
<script src="js/data.js"></script>
<script src="js/components.js"></script>
<script src="js/app.js"></script>
<script>
  renderShell("reminders");
  const catIcon = { Dose: "doses", Inventory: "inventory", Prescription: "prescriptions", Expiry: "expiry" };
  const sevChip = { warning: "chip-warning", critical: "chip-critical", info: "chip-teal" };
  let catF = "all";

  function renderReminders(){
    const rows = WELLORA_DATA.reminders.filter(r => catF==="all" || r.category===catF);
    document.getElementById("reminder-list").innerHTML = rows.map(r => `
      <div class="card card-pad" style="display:flex; align-items:flex-start; justify-content:space-between; gap:16px; flex-wrap:wrap;">
        <div style="display:flex; gap:14px;">
          <span class="icon-chip ${sevChip[r.severity]}" style="width:40px;height:40px;">${icon(catIcon[r.category])}</span>
          <div>
            <div style="display:flex; align-items:center; gap:8px; margin-bottom:2px;">
              <span class="pill ${r.severity==='critical'?'pill-missed':r.severity==='warning'?'pill-low':'pill-upcoming'}">${r.category}</span>
            </div>
            <div style="font-weight:700; font-size:14.5px;">${r.title}</div>
            <div class="text-faint" style="font-size:12.5px;">${r.detail}</div>
            <div class="text-faint mono" style="font-size:12px; margin-top:2px;">${r.suggestion}</div>
          </div>
        </div>
        <div style="display:flex; gap:8px; flex-wrap:wrap;">
          ${r.category==='Inventory' ? `<button class="btn btn-secondary btn-sm" onclick="location.href='inventory.html'">Add stock</button><button class="btn btn-ghost btn-sm" onclick="showToast('Refill marked as ordered')">Mark refill ordered</button>` : ""}
          ${r.category==='Dose' ? `<button class="btn btn-secondary btn-sm" onclick="location.href='doses.html'">View schedule</button>` : ""}
          ${r.category==='Prescription' ? `<button class="btn btn-secondary btn-sm" onclick="location.href='prescriptions.html'">View prescription</button>` : ""}
          ${r.category==='Expiry' ? `<button class="btn btn-secondary btn-sm" onclick="location.href='medicines.html'">View medicine</button>` : ""}
          <button class="btn btn-ghost btn-sm" onclick="this.closest('.card').style.opacity=0.4; showToast('Reminder snoozed')">Snooze</button>
        </div>
      </div>`).join("") || `<div class="card"><div class="empty-state">${icon('bell')}<h3>No reminders in this category</h3></div></div>`;
  }
  document.querySelectorAll("#cat-filter button").forEach(btn => btn.addEventListener("click", () => {
    document.querySelectorAll("#cat-filter button").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active"); catF = btn.dataset.value; renderReminders();
  }));
  renderReminders();
</script>
</body>
</html>
