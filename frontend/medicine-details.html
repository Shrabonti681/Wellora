<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Medicine Details — Wellora</title>
<link rel="stylesheet" href="css/styles.css">
</head>
<body>
<div class="app-shell">
  <div id="sidebar-slot"></div>
  <div class="main-col">
    <div id="topbar-slot"></div>
    <main class="page">
      <a href="medicines.html" style="display:inline-flex; align-items:center; gap:6px; font-size:13px; font-weight:600; color:var(--ink-soft); text-decoration:none; margin-bottom:14px;" id="back-link"></a>

      <div class="page-head">
        <div class="page-head-row">
          <div>
            <span class="pill pill-taken" id="status-pill">Active</span>
            <h1 style="margin-top:8px;" id="med-title">Metformin 500 mg</h1>
            <p class="sub" id="med-for">For Rheetam</p>
          </div>
        </div>
      </div>

      <div style="display:flex; gap:10px; flex-wrap:wrap; margin-bottom:24px;" id="quick-actions"></div>

      <div class="grid grid-2" style="align-items:start; gap:20px;">
        <div style="display:flex; flex-direction:column; gap:20px;">
          <div class="card card-pad">
            <div class="section-head"><h2>Overview</h2></div>
            <div id="overview-list" style="display:grid; grid-template-columns:1fr 1fr; gap:14px; font-size:13.5px;"></div>
          </div>

          <div class="card card-pad">
            <div class="section-head"><h2>Schedule</h2><a href="doses.html" class="see-all">Edit schedule →</a></div>
            <div id="schedule-list" style="display:flex; flex-direction:column; gap:12px;"></div>
          </div>

          <div class="card card-pad">
            <div class="section-head"><h2>Prescription</h2></div>
            <div id="prescription-box"></div>
          </div>
        </div>

        <div style="display:flex; flex-direction:column; gap:20px;">
          <div class="card card-pad">
            <div class="section-head"><h2>Inventory</h2></div>
            <div style="display:flex; justify-content:space-between; align-items:flex-end; margin-bottom:10px;">
              <div>
                <div class="text-faint" style="font-size:12px;">Current stock</div>
                <div style="font-family:var(--font-display); font-size:26px; font-weight:600;" id="stock-value">18 tablets</div>
              </div>
              <span class="pill pill-low" id="stock-pill">Running low</span>
            </div>
            <div id="inv-grid" style="display:grid; grid-template-columns:1fr 1fr; gap:10px; font-size:13px; margin-bottom:14px;"></div>
            <div style="display:flex; gap:8px; flex-wrap:wrap;">
              <button class="btn btn-primary btn-sm" onclick="location.href='inventory.html'">Add stock</button>
              <button class="btn btn-secondary btn-sm" onclick="location.href='inventory.html'">Remove stock</button>
              <button class="btn btn-ghost btn-sm" onclick="location.href='inventory.html'">Correct quantity</button>
            </div>
          </div>

          <div class="card card-pad">
            <div class="section-head"><h2>Adherence — this week</h2></div>
            <div id="adherence-strip" style="margin-bottom:14px;"></div>
            <div id="adherence-stats" style="display:grid; grid-template-columns:repeat(4,1fr); gap:8px; text-align:center;"></div>
            <div class="divider"></div>
            <div style="display:flex; justify-content:space-between; align-items:center;">
              <span class="text-faint" style="font-size:12.5px;">Adherence rate</span>
              <span style="font-weight:700; font-size:18px; color:var(--success);" id="adherence-rate">91.7%</span>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>
</div>
<div id="mobilenav-slot"></div>

<script src="js/icons.js"></script>
<script src="js/data.js"></script>
<script src="js/components.js"></script>
<script src="js/app.js"></script>
<script>
  renderShell("medicines");
  document.getElementById("back-link").innerHTML = icon("chevronLeft") + "<span>Back to Medicines</span>";

  const params = new URLSearchParams(location.search);
  const med = WELLORA_DATA.medicines.find(m => m.id === params.get("id")) || WELLORA_DATA.medicines[0];

  document.getElementById("med-title").textContent = `${med.name} ${med.strength}`;
  document.getElementById("med-for").textContent = `For ${med.for}`;

  const actions = [
    { label: "Mark dose", icon: "doses", href: "doses.html" },
    { label: "Add stock", icon: "inventory", href: "inventory.html" },
    { label: "Edit schedule", icon: "schedule", href: "doses.html" },
    { label: "Upload prescription", icon: "prescriptions", href: "prescriptions.html" },
    { label: "Pause medicine", icon: "snooze", href: "#" },
    { label: "Archive medicine", icon: "box", href: "#" },
  ];
  document.getElementById("quick-actions").innerHTML = actions.map(a => `
    <a href="${a.href}" class="btn btn-secondary btn-sm">${icon(a.icon)}<span>${a.label}</span></a>
  `).join("");

  const overview = [
    ["Medicine name", med.name], ["Strength", med.strength], ["Form", med.form],
    ["Prescriber", med.prescriber], ["Pharmacy", med.pharmacy], ["Start date", med.startDate],
    ["End date", med.endDate], ["Expiry date", med.expiryDate],
  ];
  document.getElementById("overview-list").innerHTML = overview.map(([k,v]) => `
    <div><div class="text-faint" style="font-size:11.5px; text-transform:uppercase; letter-spacing:.04em;">${k}</div><div style="font-weight:600;">${v}</div></div>
  `).join("") + `<div style="grid-column:1/-1;"><div class="text-faint" style="font-size:11.5px; text-transform:uppercase; letter-spacing:.04em;">Instructions</div><div style="font-weight:600;">${med.instructions}</div></div>`;

  document.getElementById("schedule-list").innerHTML = med.schedule.map(s => `
    <div style="display:flex; align-items:center; gap:14px; padding:12px 14px; border:1px solid var(--border-soft); border-radius:var(--radius-sm);">
      <span class="mono" style="font-weight:700; width:80px;">${s.time}</span>
      <span style="font-size:13.5px; color:var(--ink-soft);">1 ${med.unit === 'capsules' ? 'capsule' : 'tablet'} · ${s.label}</span>
    </div>
  `).join("");

  document.getElementById("prescription-box").innerHTML = med.prescriptionFile ? `
    <div style="display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap;">
      <div style="display:flex; align-items:center; gap:10px;">
        <span class="icon-chip chip-teal" style="width:36px;height:36px;">${icon('file')}</span>
        <span style="font-weight:600; font-size:13.5px;">${med.prescriptionFile}</span>
      </div>
      <div style="display:flex; gap:8px;">
        <button class="btn btn-secondary btn-sm" onclick="location.href='prescriptions.html'">View</button>
        <button class="btn btn-ghost btn-sm">Download</button>
      </div>
    </div>` : `<div class="empty-state" style="padding:20px;">${icon('prescriptions')}<h3>No prescription on file</h3><p>This medicine doesn't require a linked prescription.</p></div>`;

  const stockPillCls = { low: "pill-low", good: "pill-good", critical: "pill-out" };
  const stockLabel = { low: "Running low", good: "Good", critical: "Critical" };
  document.getElementById("stock-value").textContent = `${med.stock} ${med.unit}`;
  document.getElementById("stock-pill").className = `pill ${stockPillCls[med.stockStatus]}`;
  document.getElementById("stock-pill").textContent = stockLabel[med.stockStatus];
  document.getElementById("inv-grid").innerHTML = [
    ["Daily expected usage", med.dailyUse ? med.dailyUse + " " + med.unit : "As needed"],
    ["Estimated supply", med.daysLeft ? med.daysLeft + " days" : "—"],
    ["Estimated run-out date", med.runOutDate],
    ["Refill threshold", med.refillThreshold + " " + med.unit],
  ].map(([k,v]) => `<div><div class="text-faint" style="font-size:11px;">${k}</div><div style="font-weight:600;">${v}</div></div>`).join("");

  const a = med.adherence;
  const total = a.taken + a.missed + a.skipped + a.late;
  const states = [];
  for (let i=0;i<a.taken;i++) states.push("taken");
  for (let i=0;i<a.late;i++) states.push("taken");
  for (let i=0;i<a.missed;i++) states.push("missed");
  for (let i=0;i<a.skipped;i++) states.push("skipped");
  document.getElementById("adherence-strip").innerHTML = renderStrip(states.slice(0,14));
  document.getElementById("adherence-stats").innerHTML = [
    ["Taken", a.taken, "var(--success)"], ["Missed", a.missed, "var(--critical)"],
    ["Skipped", a.skipped, "var(--ink-faint)"], ["Late", a.late, "var(--gold)"],
  ].map(([label,val,color]) => `<div><div style="font-size:19px; font-weight:700; color:${color};">${val}</div><div class="text-faint" style="font-size:11px;">${label}</div></div>`).join("");
  document.getElementById("adherence-rate").textContent = a.rate + "%";
</script>
</body>
</html>
